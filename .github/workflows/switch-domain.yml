name: Switch Domain

on:
  workflow_dispatch:
    inputs:
      subdomain:
        description: 'DuckDNS subdomain (without .duckdns.org)'
        required: true

jobs:
  switch:
    runs-on: ubuntu-latest
    steps:
      - name: Switch domain on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/image-hospital
            sudo bash scripts/switch-duckdns.sh ${{ github.event.inputs.subdomain }}
